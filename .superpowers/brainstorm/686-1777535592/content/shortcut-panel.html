<h2>快捷操作面板位置</h2>
<p class="subtitle">5 个独立通道（视频/图片/语音/音乐/编程）触发按钮，放在哪里最顺手？</p>

<div class="options">
  <div class="option" data-choice="a" onclick="toggleSelect(this)">
    <div class="letter">A</div>
    <div class="content">
      <h3>侧边栏底部（展开时）</h3>
      <p>放在侧边栏对话历史下方，展开时显示为一排小图标</p>
    </div>
  </div>
  <div class="option" data-choice="b" onclick="toggleSelect(this)">
    <div class="letter">B</div>
    <div class="content">
      <h3>顶栏中央（常驻）</h3>
      <p>放在对话区顶部标题栏下方，始终可见，点击展开专用输入面板</p>
    </div>
  </div>
  <div class="option" data-choice="c" onclick="toggleSelect(this)">
    <div class="letter">C</div>
    <div class="content">
      <h3>浮窗按钮（右下角）</h3>
      <p>对话区内右下角一个浮动 "+" 按钮，点击展开 5 个通道选项</p>
    </div>
  </div>
</div>
