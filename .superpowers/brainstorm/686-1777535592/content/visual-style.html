<h2>苹果风格视觉方向</h2>
<p class="subtitle">MiniMax 品牌 + 苹果极简主义的结合，哪种配色更符合你的品味？</p>

<div class="options">
  <div class="option" data-choice="a" onclick="toggleSelect(this)">
    <div class="letter">A</div>
    <div class="content">
      <h3>浅色主题（macOS 风格）</h3>
      <p>白底 + 淡蓝/紫色强调色，大量留白，浅灰消息气泡</p>
    </div>
  </div>
  <div class="option" data-choice="b" onclick="toggleSelect(this)">
    <div class="letter">B</div>
    <div class="content">
      <h3>深色主题（Apple Dark Mode）</h3>
      <p>深灰/近黑背景 + 柔和渐变强调色，气泡用深色层次区分</p>
    </div>
  </div>
  <div class="option" data-choice="c" onclick="toggleSelect(this)">
    <div class="letter">C</div>
    <div class="content">
      <h3>双主题（用户切换）</h3>
      <p>默认浅色，用户可随时切换深色，完整实现两种风格</p>
    </div>
  </div>
</div>
