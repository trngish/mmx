<h2>主布局结构</h2>
<p class="subtitle">侧边栏 + 对话区域的基本布局，有两种典型方案</p>

<div class="split">
  <div class="mockup">
    <div class="mockup-header">方案 A：固定侧边栏</div>
    <div class="mockup-body">
      <div style="display: flex; height: 400px; background: #f5f5f7; border-radius: 12px; overflow: hidden;">
        <div style="width: 240px; background: rgba(255,255,255,0.8); backdrop-filter: blur(20px); border-right: 1px solid rgba(0,0,0,0.05); padding: 20px;">
          <div style="height: 40px; background: #e8e8ed; border-radius: 8px; margin-bottom: 16px;"></div>
          <div style="height: 32px; background: #e8e8ed; border-radius: 8px; margin-bottom: 8px;"></div>
          <div style="height: 32px; background: #e8e8ed; border-radius: 8px; margin-bottom: 8px;"></div>
          <div style="height: 32px; background: #e8e8ed; border-radius: 8px; margin-bottom: 8px;"></div>
          <div style="height: 32px; background: #e8e8ed; border-radius: 8px;"></div>
        </div>
        <div style="flex: 1; padding: 20px;">
          <div style="height: 100%; background: white; border-radius: 12px;"></div>
        </div>
      </div>
    </div>
    <div class="card-body">
      <h3>固定 240px 侧边栏</h3>
      <p>始终可见，不占用内容区空间</p>
    </div>
  </div>
  <div class="mockup">
    <div class="mockup-header">方案 B：可收放侧边栏</div>
    <div class="mockup-body">
      <div style="display: flex; height: 400px; background: #f5f5f7; border-radius: 12px; overflow: hidden;">
        <div style="width: 60px; background: rgba(255,255,255,0.8); backdrop-filter: blur(20px); border-right: 1px solid rgba(0,0,0,0.05); padding: 20px 10px;">
          <div style="height: 40px; background: #e8e8ed; border-radius: 8px; margin-bottom: 16px;"></div>
          <div style="height: 32px; background: #e8e8ed; border-radius: 50%; margin-bottom: 8px;"></div>
          <div style="height: 32px; background: #e8e8ed; border-radius: 50%; margin-bottom: 8px;"></div>
          <div style="height: 32px; background: #e8e8ed; border-radius: 50%; margin-bottom: 8px;"></div>
          <div style="height: 32px; background: #e8e8ed; border-radius: 50%;"></div>
        </div>
        <div style="flex: 1; padding: 20px;">
          <div style="height: 100%; background: white; border-radius: 12px;"></div>
        </div>
      </div>
    </div>
    <div class="card-body">
      <h3>收放到图标栏</h3>
      <p>点击按钮展开/收起，节省空间</p>
    </div>
  </div>
</div>
